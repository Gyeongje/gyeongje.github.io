<script src="{{ "/assets/vendor/highlight/highlight.pack.js" | prepend: site.baseurl }}?v={{ site.time | date: '%s' }}"></script>
<script>hljs.initHighlightingOnLoad();</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<script>
var currentLang = 'en';

function applyLang() {
  var sw = document.getElementById('lang-switch');
  if (sw) {
    if (currentLang === 'ko') {
      sw.classList.add('is-ko');
    } else {
      sw.classList.remove('is-ko');
    }
  }

  var els = document.querySelectorAll('[data-en][data-ko]');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var val = el.getAttribute('data-' + currentLang);
    if (val.indexOf('<') !== -1) {
      el.innerHTML = val;
    } else if (el.children.length === 0) {
      el.textContent = val;
    }
  }
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'ko' : 'en';
  applyLang();
}

document.addEventListener('DOMContentLoaded', applyLang);

function generatePDF() {
  var content = document.getElementById('cv-content');
  if (!content) { alert('CV content not found.'); return; }

  var clone = content.cloneNode(true);

  // --- Same site font (Quicksand) for PDF ---
  var wrapper = document.createElement('div');
  wrapper.style.padding = '12px 36px';
  wrapper.style.fontFamily = "'Quicksand', 'Pretendard Variable', Pretendard, sans-serif";
  wrapper.style.fontSize = '11px';
  wrapper.style.lineHeight = '1.5';
  wrapper.style.color = '#1a1a2e';

  // Header
  var header = document.createElement('div');
  header.style.textAlign = 'center';
  header.style.marginBottom = '6px';
  header.style.paddingBottom = '8px';
  header.style.borderBottom = '2px solid #16a085';
  if (currentLang === 'ko') {
    header.innerHTML = '<h1 style="margin:0;color:#1a1a2e;font-size:22px;font-family:Quicksand,Pretendard Variable,Pretendard,sans-serif;font-weight:bold;">오경제 (Gyeongje Oh)</h1><p style="color:#16a085;margin:4px 0 0;font-size:11px;font-family:Quicksand,Pretendard Variable,Pretendard,sans-serif;">Offensive Security Researcher | ogj0824@gmail.com | github.com/Gyeongje</p>';
  } else {
    header.innerHTML = '<h1 style="margin:0;color:#1a1a2e;font-size:22px;font-family:Quicksand,Pretendard Variable,Pretendard,sans-serif;font-weight:bold;">Gyeongje Oh</h1><p style="color:#16a085;margin:4px 0 0;font-size:11px;font-family:Quicksand,Pretendard Variable,Pretendard,sans-serif;">Offensive Security Researcher | ogj0824@gmail.com | github.com/Gyeongje</p>';
  }
  wrapper.appendChild(header);
  wrapper.appendChild(clone);

  var filename = currentLang === 'ko' ? 'CV_오경제.pdf' : 'CV_Gyeongje_Oh.pdf';
  var opt = {
    margin: [10, 12, 10, 12],
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(wrapper).save();
}
</script>
